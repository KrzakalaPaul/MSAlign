# MLPs
d_ms_encoder: 1024 # DreaMS
d_mol_encoder: 768 # ChemBERTa
d_hidden: 2048
d_shared: 1024
n_hidden_layers: 1
dropout: 0.2
layernorm: True

# Encoders
encoder_spectra: dreams
encoder_mol: chemberta_13M

# Training
lr: 1e-4
weight_decay: 1e-5
n_warmup_steps: 2000
n_max_steps: 16000

# Loss
k_candidates: 128
batch_size: 128

# Hardware concerns
n_workers: 8
batch_size_eval: 16
