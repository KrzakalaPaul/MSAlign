# MLP BINS
mlp_hidden: 512
n_hidden_layers: 1
mlp_dropout: 0.4
layernorm: True

# GNN
gnn_channels: [64,128,256]
gnn_hidden_dim: 512
attn_heads: [12,12,12]
gnn_dropout: 0.2
pooling: "max"
gnn_type: "gcn"

d_shared: 128

# Encoders
bin_width: 1.0
max_mz: 1005

# Training
lr: 0.0001
weight_decay: 0.00005
n_warmup_steps: 2000
n_max_steps: 100000
n_max_steps_finetune: 10000

# Loss
k_candidates: 32
batch_size: 64

# Hardware concerns
n_workers: 8
batch_size_eval: 16

