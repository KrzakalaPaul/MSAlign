# MLPs
d_hidden: 2048
d_shared: 1024
n_hidden_layers: 1
dropout: 0.2
layernorm: True

# Encoders
fingerprint_size: 4096
bin_width: 0.1
max_mz: 1005

# Training
lr: 0.0001
weight_decay: 0.00005
n_warmup_steps: 2000
n_max_steps: 16000

# Loss
k_candidates: 128
batch_size: 128

# Hardware concerns
n_workers: 8
batch_size_eval: 16
