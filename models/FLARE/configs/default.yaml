# MAX SIM
use_max_sim: True
pooling_mol: "max" # Not used if use_max_sim is True, but kept for ablations
pooling_ms: "max" # Not used if use_max_sim is True, but kept for ablations

# PEAK TRANSFORMER
transformer_d_model: 128
transformer_d_hidden: 512
transformer_n_layers: 3
transformer_n_heads: 8
transformer_dropout: 0.2

# GNN
gnn_channels: [64,128,256]
gnn_hidden_dim: 512
attn_heads: [12,12,12]
gnn_dropout: 0.2
gnn_type: "gcn"
mlp_dropout: 0.2

shared_dim: 128

# Training
lr: 0.0001
weight_decay: 0.0
n_warmup_steps: 2000
n_max_steps: 800000


# Loss
k_candidates: 32
batch_size: 32
trainable_temperature: False

# Hardware concerns
n_workers: 8
batch_size_eval: 16

